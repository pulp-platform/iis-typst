name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: fsfe/reuse-action@v6

  compile:
    name: Compile (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [dissertation, thesis, research-plan, assignment]
    steps:
      - uses: actions/checkout@v6
      - uses: typst-community/setup-typst@v5

      - name: Compile template
        run: typst compile --package-path packages ${{ matrix.package }}/template/main.typ

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: typstyle-rs/typstyle-action@main
        with:
          opts: --check
          inputs: "**/*.typ"
